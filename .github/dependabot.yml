version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "ci"
    labels:
      - "type: github-actions"
      - "priority: high"
      - "status: needs review"
    groups:
      github-actions:
        patterns:
          - "*"